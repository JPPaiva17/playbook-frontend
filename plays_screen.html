<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBook — Minhas Plays</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <link rel="stylesheet" href="src/css/dashboard.css" />
</head>
<body class="dash-body">

  <header class="appbar">
    <div class="appbar__inner">
      <a href="plays_screen.html" class="appbar__logo">
        <i data-lucide="book-open"></i>
        <span>Play<strong>Book</strong></span>
      </a>

      <nav class="appbar__nav">
        <a href="plays_list.html" class="nav-link">
          <i data-lucide="compass"></i>
          <span class="nav-label">Explorar</span>
        </a>
        <a href="plays_screen.html" class="nav-link active">
          <i data-lucide="crosshair"></i>
          <span class="nav-label">Minhas Plays</span>
        </a>
        <a href="playbooks_screen.html" class="nav-link">
          <i data-lucide="layers"></i>
          <span class="nav-label">Meus Playbooks</span>
        </a>
      </nav>

      <div class="appbar__actions">
        <button class="btn-create" id="open-create-modal">
          <i data-lucide="plus"></i>
          <span>Criar Play</span>
        </button>

        <div class="avatar-wrapper">
          <button class="avatar-btn" id="avatar-btn" aria-expanded="false" aria-haspopup="true">
            <div class="avatar-circle" id="avatar-initials">?</div>
            <span id="avatar-name"></span>
            <span class="avatar-chevron"><i data-lucide="chevron-down"></i></span>
          </button>
          <div class="avatar-dropdown" id="avatar-dropdown">
            <div class="dropdown-header">
              <div class="drop-name" id="drop-name">—</div>
              <div class="drop-email" id="drop-email">—</div>
            </div>
            <a href="profile.html" class="dropdown-item">
              <i data-lucide="user"></i> Meu perfil
            </a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item danger" id="logout-button">
              <i data-lucide="log-out"></i> Sair
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="dash-main">
    <p class="dash-error" id="error-message"></p>

    <div class="dash-welcome">
      <h1 id="welcome-text">Olá!</h1>
      <p>Gerencie suas plays de CS2.</p>
    </div>

    <div class="dash-stats">
      <div class="stat-chip">
        <i data-lucide="crosshair"></i>
        <strong id="stat-plays">—</strong> plays
      </div>
    </div>

    <section class="dash-section">
      <div class="dash-section__header">
        <h2>
          <i data-lucide="crosshair"></i>
          Minhas Plays
          <span class="section-count" id="count-plays">0</span>
        </h2>
        <button class="dash-link" id="open-create-modal-2" style="background:none;border:none;cursor:pointer;font-size:inherit;">
          <i data-lucide="plus"></i> Nova play
        </button>
      </div>
      <div id="plays-list" class="item-grid"></div>
    </section>
  </main>

  <!-- Modal: criar / editar play -->
  <div class="modal-overlay" id="play-modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title">Nova Play</h2>
        <button class="modal__close" id="modal-close" aria-label="Fechar">
          <i data-lucide="x"></i>
        </button>
      </div>

      <p class="modal__error" id="modal-error"></p>

      <form id="play-form" class="modal__form">
        <div class="modal__row">
          <div class="modal__field">
            <label for="title">Título</label>
            <input class="modal__input" type="text" id="title" name="title" required maxlength="255" />
          </div>
          <div class="modal__field">
            <label for="map">Mapa</label>
            <select class="modal__input" id="map" name="map">
              <option value="">Selecione um mapa</option>
            </select>
          </div>
        </div>

        <div class="modal__field">
          <label for="description">Descrição curta</label>
          <textarea class="modal__input" id="description" name="description" rows="2"></textarea>
        </div>

        <div class="modal__field">
          <label for="content">Passo a passo</label>
          <textarea class="modal__input" id="content" name="content" rows="4" required></textarea>
        </div>

        <div class="modal__row">
          <div class="modal__field">
            <label for="video_url">Link do vídeo</label>
            <input class="modal__input" type="url" id="video_url" name="video_url" placeholder="https://youtube.com/..." />
          </div>
          <div class="modal__field">
            <label for="players_required">Jogadores</label>
            <input class="modal__input" type="number" id="players_required" name="players_required" min="1" max="5" value="5" />
          </div>
          <div class="modal__field">
            <label for="visibility">Visibilidade</label>
            <select class="modal__input" id="visibility" name="visibility">
              <option value="public">Pública</option>
              <option value="private">Privada</option>
            </select>
          </div>
        </div>

        <fieldset class="modal__fieldset">
          <legend>Granadas</legend>
          <div class="modal__row">
            <div class="modal__field">
              <label for="smokes">Smokes</label>
              <input class="modal__input" type="number" id="smokes" min="0" value="0" />
            </div>
            <div class="modal__field">
              <label for="flashbangs">Flashbangs</label>
              <input class="modal__input" type="number" id="flashbangs" min="0" value="0" />
            </div>
            <div class="modal__field">
              <label for="he_grenades">HE</label>
              <input class="modal__input" type="number" id="he_grenades" min="0" value="0" />
            </div>
            <div class="modal__field">
              <label for="molotovs">Molotovs</label>
              <input class="modal__input" type="number" id="molotovs" min="0" value="0" />
            </div>
            <div class="modal__field">
              <label for="decoys">Decoys</label>
              <input class="modal__input" type="number" id="decoys" min="0" value="0" />
            </div>
          </div>
        </fieldset>

        <div class="modal__footer">
          <button type="button" class="modal__btn-cancel" id="modal-cancel">Cancelar</button>
          <button type="submit" class="modal__btn-submit" id="submit-button">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script type="module" src="dist/js/plays_screen.js"></script>
</body>
</html>
