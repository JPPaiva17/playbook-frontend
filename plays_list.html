<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBook — Explorar</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <link rel="stylesheet" href="src/css/dashboard.css" />
</head>
<body class="dash-body">

  <div id="appbar-root"></div>

<main class="dash-main">
    <p class="dash-error" id="error-message"></p>

    <div class="page-header">
      <div class="page-header__title">
        <h1>Explorar <span class="section-count" id="result-count">0</span></h1>
      </div>
      <div class="page-header__controls">

        <!-- Toggle HUD -->
        <div class="explore-toggle">
          <button class="explore-toggle__btn active" id="tab-plays">
            <i data-lucide="crosshair"></i>
            <span>Plays</span>
          </button>
          <button class="explore-toggle__btn" id="tab-playbooks">
            <i data-lucide="layers"></i>
            <span>Playbooks</span>
          </button>
        </div>

        <!-- Search -->
        <div class="search-bar">
          <i data-lucide="search"></i>
          <input type="text" id="search-input" placeholder="Buscar por título..." autocomplete="off" />
        </div>

        <!-- Filter (plays only) -->
        <div class="filter-wrapper" id="filter-wrapper">
          <button class="filter-btn" id="filter-btn">
            <i data-lucide="sliders-horizontal"></i>
            Filtrar
          </button>
          <div class="filter-dropdown" id="filter-dropdown">
            <div class="filter-section">
              <label class="filter-label">Mapa</label>
              <select class="modal__input" id="filter-map">
                <option value="">Todos os mapas</option>
              </select>
            </div>
            <div class="filter-section">
              <label class="filter-label">Granadas</label>
              <div class="filter-grenades">
                <label class="filter-check">
                  <input type="checkbox" id="f-smokes" />
                  <span class="grenade-icon grenade-icon--smoke"><i data-lucide="wind"></i></span>
                  Smoke
                </label>
                <label class="filter-check">
                  <input type="checkbox" id="f-flash" />
                  <span class="grenade-icon grenade-icon--flash"><i data-lucide="zap"></i></span>
                  Flashbang
                </label>
                <label class="filter-check">
                  <input type="checkbox" id="f-he" />
                  <span class="grenade-icon grenade-icon--he"><i data-lucide="bomb"></i></span>
                  HE
                </label>
                <label class="filter-check">
                  <input type="checkbox" id="f-molotov" />
                  <span class="grenade-icon grenade-icon--molotov"><i data-lucide="flame"></i></span>
                  Molotov
                </label>
              </div>
            </div>
            <div class="filter-footer">
              <button type="button" class="modal__btn-cancel" id="filter-clear" style="padding:0.4rem 0.8rem;font-size:0.8rem;">Limpar</button>
              <button type="button" class="modal__btn-submit" id="filter-apply" style="padding:0.4rem 0.8rem;font-size:0.8rem;">Aplicar</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="explore-grid" class="item-grid"></div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script type="module" src="dist/js/plays_list.js"></script>
</body>
</html>
