<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBook — Meu Perfil</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <link rel="stylesheet" href="src/css/dashboard.css" />
</head>
<body class="dash-body">

  <header class="appbar">
    <div class="appbar__inner">
      <a href="plays_screen.html" class="appbar__logo">
        <i data-lucide="book-open"></i>
        <span>Play<strong>Book</strong></span>
      </a>

      <nav class="appbar__nav">
        <a href="plays_list.html" class="nav-link">
          <i data-lucide="compass"></i>
          <span class="nav-label">Explorar</span>
        </a>
        <a href="plays_screen.html" class="nav-link">
          <i data-lucide="crosshair"></i>
          <span class="nav-label">Minhas Plays</span>
        </a>
        <a href="playbooks_screen.html" class="nav-link">
          <i data-lucide="layers"></i>
          <span class="nav-label">Meus Playbooks</span>
        </a>
      </nav>

      <div class="appbar__actions">
        <div class="avatar-wrapper">
          <button class="avatar-btn" id="avatar-btn" aria-expanded="false" aria-haspopup="true">
            <div class="avatar-circle" id="avatar-initials">?</div>
            <span id="avatar-name"></span>
            <span class="avatar-chevron"><i data-lucide="chevron-down"></i></span>
          </button>
          <div class="avatar-dropdown" id="avatar-dropdown">
            <div class="dropdown-header">
              <div class="drop-name" id="drop-name">—</div>
              <div class="drop-email" id="drop-email">—</div>
            </div>
            <a href="profile.html" class="dropdown-item active">
              <i data-lucide="user"></i> Meu perfil
            </a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item danger" id="logout-button">
              <i data-lucide="log-out"></i> Sair
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="dash-main profile-main">
    <p class="dash-error" id="error-message"></p>
    <p class="dash-success" id="success-message"></p>

    <!-- ── Cartão de visualização ── -->
    <section class="profile-card" id="profile-view">
      <div class="profile-card__top">
        <div class="avatar-circle profile-card__avatar" id="profile-avatar">?</div>
        <div class="profile-card__info">
          <h1 id="profile-username">—</h1>
          <p id="profile-email">—</p>
          <p class="profile-card__meta" id="profile-joined"></p>
        </div>
        <button type="button" class="btn-create" id="edit-toggle-button">
          <i data-lucide="pencil"></i>
          <span>Editar perfil</span>
        </button>
      </div>

      <div class="dash-stats">
        <a href="plays_screen.html" class="stat-chip">
          <i data-lucide="crosshair"></i>
          <strong id="stat-plays">0</strong> Minhas Plays
        </a>
        <a href="playbooks_screen.html" class="stat-chip">
          <i data-lucide="layers"></i>
          <strong id="stat-playbooks">0</strong> Meus Playbooks
        </a>
      </div>
    </section>

    <!-- ── Formulário de edição (escondido até clicar em "Editar perfil") ── -->
    <section class="profile-card" id="profile-edit" hidden>
      <h2 class="profile-card__edit-title">Editar perfil</h2>

      <form id="profile-form" class="modal__body">
        <div class="modal__field">
          <label for="username">Usuário</label>
          <input class="modal__input" type="text" id="username" name="username" required maxlength="150" />
        </div>

        <div class="modal__field">
          <label for="email">Email</label>
          <input class="modal__input" type="email" id="email" name="email" required />
        </div>

        <div class="modal__field">
          <label for="phone">Celular (DDD + número)</label>
          <input
            class="modal__input"
            type="tel"
            id="phone"
            name="phone"
            required
            pattern="\d{10,11}"
            title="Somente dígitos, com DDD (ex: 21987654321)"
          />
        </div>

        <div class="profile-card__divider"></div>
        <p class="profile-card__hint">Deixe os campos de senha em branco para não alterá-la.</p>

        <div class="modal__field">
          <label for="current-password">Senha atual</label>
          <div class="password-field">
            <input class="modal__input" type="password" id="current-password" name="current-password" autocomplete="current-password" />
            <button type="button" class="password-toggle" id="current-password-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
          </div>
        </div>

        <div class="modal__row">
          <div class="modal__field">
            <label for="new-password">Nova senha</label>
            <div class="password-field">
              <input class="modal__input" type="password" id="new-password" name="new-password" autocomplete="new-password" />
              <button type="button" class="password-toggle" id="new-password-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
            </div>
          </div>
          <div class="modal__field">
            <label for="new-password-confirm">Confirmar nova senha</label>
            <div class="password-field">
              <input class="modal__input" type="password" id="new-password-confirm" name="new-password-confirm" autocomplete="new-password" />
              <button type="button" class="password-toggle" id="new-password-confirm-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
            </div>
          </div>
        </div>
        <small class="field-hint">Mín. 8 caracteres, 1 maiúscula, 1 minúscula e 1 caractere especial.</small>

        <div class="modal__footer">
          <button type="button" class="modal__btn-cancel" id="cancel-edit-button">Cancelar</button>
          <button type="submit" class="modal__btn-submit" id="submit-button">Salvar alterações</button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script type="module" src="dist/js/profile.js"></script>
</body>
</html>
