<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBook — Login</title>
  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>PlayBook</h1>
      <p class="error-message" id="error-message"></p>
      <form id="login-form">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="password">Senha</label>
          <div class="password-field">
            <input type="password" id="password" name="password" required autocomplete="current-password" />
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
          </div>
        </div>
        <button type="submit">Entrar</button>
      </form>
      <p class="auth-switch">
        Não tem conta? <a href="register.html">Cadastre-se</a>
      </p>
    </div>
  </div>
  <script type="module" src="dist/js/login.js"></script>
</body>
</html>
