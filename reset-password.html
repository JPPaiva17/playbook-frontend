<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBook — Redefinir senha</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <link rel="stylesheet" href="src/css/auth.css" />
</head>
<body class="auth-body">

  <div class="glass-card">
    <div class="auth-logo">📖</div>
    <h1>Redefinir senha</h1>
    <p class="auth-subtitle">Cole o código (uid e token) recebido e escolha a nova senha.</p>

    <p class="glass-error" id="error-message"></p>
    <p class="glass-success" id="success-message"></p>

    <form id="reset-form">
      <div class="glass-field">
        <label for="uid">UID</label>
        <input class="glass-input" type="text" id="uid" name="uid" required placeholder="Código uid" />
      </div>

      <div class="glass-field">
        <label for="token">Token</label>
        <input class="glass-input" type="text" id="token" name="token" required placeholder="Código token" />
      </div>

      <div class="glass-field">
        <label for="new-password">Nova senha</label>
        <div class="password-field">
          <input class="glass-input" type="password" id="new-password" name="new-password" required autocomplete="new-password" placeholder="••••••••" />
          <button type="button" class="password-toggle" id="new-password-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
        </div>
        <p class="glass-hint">Mín. 8 caracteres, 1 maiúscula, 1 minúscula e 1 caractere especial.</p>
      </div>

      <div class="glass-field">
        <label for="new-password-confirm">Confirmar nova senha</label>
        <div class="password-field">
          <input class="glass-input" type="password" id="new-password-confirm" name="new-password-confirm" required autocomplete="new-password" placeholder="••••••••" />
          <button type="button" class="password-toggle" id="new-password-confirm-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
        </div>
      </div>

      <button type="submit" class="glass-submit" id="submit-button">Redefinir senha</button>
    </form>

    <p class="glass-switch">
      <a href="login.html">Voltar para o login</a>
    </p>
  </div>

  <script type="module" src="dist/js/reset-password.js"></script>
</body>
</html>
