<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBook — Registro</title>
  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Criar conta</h1>
      <p class="error-message" id="error-message"></p>
      <form id="register-form">
        <div class="form-field">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required autocomplete="username" />
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="form-field">
          <label for="phone">Celular (DDD + número)</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            required
            autocomplete="tel"
            placeholder="21987654321"
            pattern="\d{10,11}"
            title="Somente dígitos, com DDD (ex: 21987654321)"
          />
        </div>
        <div class="form-field">
          <label for="password">Senha</label>
          <div class="password-field">
            <input type="password" id="password" name="password" required autocomplete="new-password" />
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
          </div>
          <small class="field-hint">Mín. 8 caracteres, 1 maiúscula, 1 minúscula e 1 caractere especial.</small>
        </div>
        <div class="form-field">
          <label for="password-confirm">Confirme a senha</label>
          <div class="password-field">
            <input type="password" id="password-confirm" name="password-confirm" required autocomplete="new-password" />
            <button type="button" class="password-toggle" id="password-confirm-toggle" aria-label="Manter pressionado para mostrar a senha">👁</button>
          </div>
        </div>
        <button type="submit">Cadastrar</button>
      </form>
      <p class="auth-switch">
        Já tem conta? <a href="login.html">Entrar</a>
      </p>
    </div>
  </div>
  <script type="module" src="dist/js/register.js"></script>
</body>
</html>
