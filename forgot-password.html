<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayBook — Esqueci minha senha</title>
  <link rel="stylesheet" href="src/css/styles.css" />
  <link rel="stylesheet" href="src/css/auth.css" />
</head>
<body class="auth-body">

  <div class="glass-card">
    <div class="auth-logo">📖</div>
    <h1>Esqueci minha senha</h1>
    <p class="auth-subtitle">Informe seu email para receber as instruções de redefinição.</p>

    <p class="glass-error" id="error-message"></p>
    <p class="glass-success" id="success-message"></p>

    <form id="forgot-form">
      <div class="glass-field">
        <label for="email">Email</label>
        <input class="glass-input" type="email" id="email" name="email" required autocomplete="email" placeholder="seu@email.com" />
      </div>

      <button type="submit" class="glass-submit" id="submit-button">Enviar instruções</button>
    </form>

    <p class="glass-switch">
      Já tem o código? <a href="reset-password.html">Redefinir senha</a>
    </p>
    <p class="glass-switch">
      <a href="login.html">Voltar para o login</a>
    </p>
  </div>

  <script type="module" src="dist/js/forgot-password.js"></script>
</body>
</html>
